<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobieE Mission Control Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚀 RobieE Mission Control Dashboard</h1>
    </header>
    
    <main>
        <!-- Financial Widget -->
        <section id="financial-widgets" class="module financial-module">
            <div id="financial-content">
                <p>Loading financial data...</p>
            </div>
        </section>

        <!-- KR Progress Widget -->
        <section id="kr-widgets" class="module kr-module">
            <div id="kr-content">
                <p>Loading KR progress...</p>
            </div>
        </section>

        <!-- Next Work Up Widget -->
        <section id="next-work-widgets" class="module next-work-module">
            <div id="next-work-content">
                <p>Loading next tasks...</p>
            </div>
        </section>
    </main>
    
    <!-- Load widgets -->
    <script src="financial-widget.js"></script>
    <script src="kr-widget.js"></script>
    <script src="next-work-widget.js"></script>
    <script>
        // Initialize widgets on page load
        document.addEventListener('DOMContentLoaded', function() {
            // ===== FINANCIAL WIDGET =====
            console.log('🚀 Initializing financial widget...');
            try {
                const widget = new FinancialWidget();
                const container = document.getElementById('financial-content');
                
                // Initial load
                widget.fetchData().then(data => {
                    console.log('📊 Financial data loaded:', data);
                    container.innerHTML = widget.generateHTML(data);
                }).catch(err => {
                    console.error('❌ Financial widget error:', err);
                    container.innerHTML = '<p style="color: #FF6666;">Unable to load financial data. Please check browser console.</p>';
                });
                
                // Auto-refresh every 5 minutes
                widget.startAutoRefresh(data => {
                    console.log('🔄 Financial data refresh...');
                    container.innerHTML = widget.generateHTML(data);
                });
            } catch (err) {
                console.error('❌ Financial widget initialization failed:', err);
            }

            // ===== KR WIDGET =====
            console.log('🚀 Initializing KR widget...');
            try {
                const krWidget = new KRWidget();
                const krContainer = document.getElementById('kr-content');
                
                // Initial load
                krWidget.fetchData()
                    .then(data => {
                        console.log('🎯 KR data loaded:', data);
                        krContainer.innerHTML = krWidget.generateHTML(data);
                    })
                    .catch(err => {
                        console.error('❌ KR widget error:', err);
                        krContainer.innerHTML = '<p style="color: #FF6666;">Unable to load KR data.</p>';
                    });
                
                // Auto-refresh every 5 minutes
                setInterval(() => {
                    krWidget.fetchData().then(data => {
                        console.log('🔄 KR data refresh...');
                        krContainer.innerHTML = krWidget.generateHTML(data);
                    });
                }, 5 * 60 * 1000);
            } catch (err) {
                console.error('❌ KR widget initialization failed:', err);
            }

            // ===== NEXT WORK WIDGET =====
            console.log('🚀 Initializing Next Work widget...');
            try {
                const nextWorkWidget = new NextWorkWidget();
                const nextWorkContainer = document.getElementById('next-work-content');
                
                // Initial load
                nextWorkWidget.fetchData()
                    .then(data => {
                        console.log('📋 Next work data loaded:', data);
                        nextWorkContainer.innerHTML = nextWorkWidget.generateHTML(data);
                    })
                    .catch(err => {
                        console.error('❌ Next work widget error:', err);
                        nextWorkContainer.innerHTML = '<p style="color: #FF6666;">Unable to load task data.</p>';
                    });
                
                // Auto-refresh every 5 minutes
                setInterval(() => {
                    nextWorkWidget.fetchData().then(data => {
                        console.log('🔄 Next work data refresh...');
                        nextWorkContainer.innerHTML = nextWorkWidget.generateHTML(data);
                    });
                }, 5 * 60 * 1000);
            } catch (err) {
                console.error('❌ Next work widget initialization failed:', err);
            }
        });
    </script>
</body>
</html>
