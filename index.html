<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobieE Mission Control Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚀 RobieE Mission Control Dashboard</h1>
    </header>
    
    <main>
        <!-- Financial Widget -->
        <section id="financial-widgets" class="module financial-module">
            <div id="financial-content">
                <p>Loading financial data...</p>
            </div>
        </section>
    </main>
    
    <!-- Load financial widget -->
    <script src="financial-widget.js"></script>
    <script>
        // Embedded default data (will be updated by the daily cron via data.json)
        const defaultData = {
            dashboard: {
                todayTotal: '$3.33',
                ytdTotal: '$545.86',
                dailyAverage: '$2.25',
                openrouterYtd: '$21.60',
                anthropicYtd: '$107.85',
                status: '✅'
            },
            runningTotals: {
                apiSpend: '$129.45',
                fixedCosts: '$416.41',
                grandTotal: '$545.86',
                dailyAvgAll: '$2.25/day',
                dailyAvgApi: '$1.52/day'
            },
            lastUpdate: 'March 26, 2026 — 10:36 AM ET'
        };

        // Initialize financial widget on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Initializing financial widget...');
            
            try {
                const widget = new FinancialWidget();
                const container = document.getElementById('financial-content');
                
                // Try to fetch live data first
                console.log('Attempting to fetch live data...');
                widget.fetchData()
                    .then(data => {
                        console.log('✅ Live data loaded:', data);
                        container.innerHTML = widget.generateHTML(data);
                    })
                    .catch(err => {
                        console.warn('Live data fetch failed, using embedded data:', err);
                        // Use embedded default data
                        container.innerHTML = widget.generateHTML(defaultData);
                    });
                
                // Auto-refresh every 5 minutes
                widget.startAutoRefresh(data => {
                    console.log('🔄 Auto-refresh:', data);
                    container.innerHTML = widget.generateHTML(data);
                });
            } catch (err) {
                console.error('❌ Widget initialization failed:', err);
                // Fallback: render with default data
                document.getElementById('financial-content').innerHTML = 
                    '<div class="financial-widget">' +
                    '<p style="color: #FFAA00;">Dashboard loaded with default data (live update failed)</p>' +
                    '</div>';
            }
        });
    </script>
</body>
</html>
