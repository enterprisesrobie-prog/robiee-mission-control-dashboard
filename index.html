<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobieE Mission Control Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚀 RobieE Mission Control Dashboard</h1>
    </header>
    
    <main>
        <!-- Financial Widget -->
        <section id="financial-widgets" class="module financial-module">
            <div id="financial-content">
                <p>Loading financial data...</p>
            </div>
        </section>
    </main>
    
    <!-- Load financial widget -->
    <script src="financial-widget.js"></script>
    <script>
        // Initialize financial widget on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Initializing financial widget...');
            
            try {
                const widget = new FinancialWidget();
                const container = document.getElementById('financial-content');
                
                // Initial load
                widget.fetchData().then(data => {
                    console.log('📊 Data loaded:', data);
                    container.innerHTML = widget.generateHTML(data);
                }).catch(err => {
                    console.error('❌ Financial widget error:', err);
                    container.innerHTML = '<p style="color: #FF6666;">Unable to load financial data. Please check browser console.</p>';
                });
                
                // Auto-refresh every 5 minutes
                widget.startAutoRefresh(data => {
                    console.log('🔄 Refreshing data...');
                    container.innerHTML = widget.generateHTML(data);
                });
            } catch (err) {
                console.error('❌ Widget initialization failed:', err);
            }
        });
    </script>
</body>
</html>
